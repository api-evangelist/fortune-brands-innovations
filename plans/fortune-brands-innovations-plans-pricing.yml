description: Fortune Brands Innovations (FBIN) is a publicly traded holding company for home, security, and outdoor brands (Moen, Master Lock, Yale, House of Rohl, Therma-Tru, Fiberon, etc.). FBIN itself does not operate a developer portal or publish APIs; consumer/connected-product APIs sit at the brand level (e.g. Moen Smart Water Network, Yale Home / Yale Connect, Master Lock Vault Enterprise). No public developer pricing exists at the FBIN parent level.
notes: Parent-corp providerId. No FBIN-level developer APIs to price. Brand-level APIs (Moen, Yale, Master Lock) are consumer/IoT and partner-licensed; FBIN does not aggregate them under a unified pricing scheme. Scaffold reduced to a single "no-public-API-program" plan.
sources:
  - https://www.fbin.com/
plans:
  - id: fortune-brands-innovations-no-public-api-program
    name: No Public API Program (Holding Company)
    type: enterprise
    description: FBIN as a parent corporation does not offer a unified developer API program or public pricing. Developer access to specific brands (Moen Smart Water, Yale, Master Lock, etc.) is governed by each brand's own partner program and is contact-sales / partner-by-invite.
    entries:
      - label: Brand-Level Partner Access
        description: Access negotiated separately with each FBIN brand
        name: brand_partner_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        domains: []
        unit: 1
        price: contact brand sales
        userMultiplied: false
    elements:
      - name: Moen Smart Water (separate brand program)
      - name: Yale Home / Yale Connect (separate brand program)
      - name: Master Lock Vault Enterprise (separate brand program)
      - name: No Unified FBIN Developer Portal
