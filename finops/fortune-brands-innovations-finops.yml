    description: Count of active partner agreements with FBIN brands (Moen, Yale, Master Lock, etc.)
    unit: agreement
    aggregation: max
    dimensions:
      - brand
      - partner
principles:
  - name: Visibility
    description: Aggregate developer/API spend across FBIN brands by reviewing each brand's separate partner agreement; FBIN does not publish a consolidated API spend view.
  - name: Allocation
    description: Allocate any brand-level API spend to the consuming product / division.
  - name: Optimization
    description: Negotiate cross-brand bundles where multiple FBIN brand APIs are consumed by a single partner.
  - name: Accountability
    description: Each FBIN brand owns its own developer-program economics; corporate procurement may aggregate sourcing.
